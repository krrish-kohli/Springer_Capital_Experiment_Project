version: 1
project: silver_validation

defaults:
  row_count:
    mode: "drift_percent"
    max_drift_percent: 5
  duplicates:
    max_duplicate_rows: 0
  missing_keys:
    max_missing_rows: 0
  default_substitution:
    enabled: true

domains:
  - name: "customer"
    tables:
      - name: "customers"
        raw_table: "raw.customers"
        silver_table: "silver.customers"
        primary_key: ["customer_id"]
        required_columns: ["customer_id", "email", "created_at"]
        rules:
          row_count:
            max_drift_percent: 3
          duplicates:
            max_duplicate_rows: 0
          missing_keys:
            check_against_raw: true
            max_missing_rows: 0
          default_substitution:
            patterns:
              - column: "country_code"
                suspicious_values: ["UNK", "UNKNOWN", "", "0"]
                max_percent: 1
              - column: "signup_date"
                suspicious_values: ["1970-01-01", "1900-01-01"]
                max_percent: 0.5
              - column: "email"
                suspicious_values: ["", "unknown@example.com"]
                max_percent: 0.2

  - name: "sales"
    tables:
      - name: "orders"
        raw_table: "raw.orders"
        silver_table: "silver.orders"
        primary_key: ["order_id"]
        required_columns: ["order_id", "customer_id", "order_total", "order_ts"]
        rules:
          row_count:
            max_drift_percent: 5
          duplicates:
            max_duplicate_rows: 0
          missing_keys:
            check_against_raw: true
            max_missing_rows: 0
          missing_fk:
            checks:
              - fk_column: "customer_id"
                ref_table: "silver.customers"
                ref_key: "customer_id"
                max_missing_rows: 0

