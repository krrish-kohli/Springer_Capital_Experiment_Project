name: "silver_validation"
version: "1.0.0"
config-version: 2

profile: "silver_validation"

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  silver_validation:
    staging:
      +materialized: view
    validation:
      +materialized: incremental
      +schema: audit
    marts:
      +materialized: view
      +schema: marts

