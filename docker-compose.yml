x-airflow-common: &airflow-common
  build:
    context: ./airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "zQkvOJUj8EqCypl-hBZWoL1lE1jBhE1U8FQoLAb8Jsc="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW_UID: "${AIRFLOW_UID:-50000}"
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_PORT: "8123"
    CLICKHOUSE_USER: default
    CLICKHOUSE_PASSWORD: ""
    CLICKHOUSE_DATABASE: default
    BATCH_DATA_DIR: /opt/airflow/data/batch
    DBT_PROJECT_DIR: /opt/airflow/dbt/medallion_demo
    DBT_PROFILES_DIR: /opt/airflow/dbt/profiles
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./dbt/medallion_demo:/opt/airflow/dbt/medallion_demo
    - ./data/batch:/opt/airflow/data/batch
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    clickhouse:
      condition: service_healthy

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: ch_medallion
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - ./clickhouse/ddl:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 30

  postgres:
    image: postgres:16
    container_name: postgres_medallion
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init_medallion
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Medallion \
          --lastname Demo \
          --role Admin \
          --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver_medallion
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler_medallion
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  nifi:
    image: apache/nifi:1.26.0
    container_name: nifi_medallion
    ports:
      - "8443:8443"
      - "8081:8081"
    environment:
      NIFI_WEB_HTTPS_PORT: "8443"
      SINGLE_USER_CREDENTIALS_USERNAME: "admin"
      SINGLE_USER_CREDENTIALS_PASSWORD: "adminadminadmin"
    volumes:
      - ./nifi/flow:/opt/nifi/nifi-current/flow
      - ./nifi/state:/opt/nifi/nifi-current/state
    depends_on:
      clickhouse:
        condition: service_healthy

  event_sim:
    build:
      context: ./event_sim
    container_name: event_sim_medallion
    environment:
      # Default realtime path (Ahmad requirement): event_sim -> NiFi -> ClickHouse bronze.
      # Troubleshooting-only shortcut: set EVENT_TARGET=clickhouse (documented in docs/troubleshooting.md).
      EVENT_TARGET: nifi
      INGEST_SOURCE: event_sim
      NIFI_INGEST_URL: http://nifi:8081/contentListener
      CLICKHOUSE_URL: http://clickhouse:8123
      EVENT_INTERVAL_SEC: "3"
    depends_on:
      clickhouse:
        condition: service_healthy
      nifi:
        condition: service_started

volumes:
  postgres_data:
